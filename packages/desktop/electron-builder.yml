appId: com.brickbot.app
productName: Brickbot
copyright: Brickbot

# 输出文件名不能带空格：productName 有空格会导致生成名与 GitHub 上传后(空格→点)的
# 资源名不一致，使 electron-updater 下载更新时 404。用无空格的 artifactName 统一三者。
artifactName: Brickbot-${version}-${arch}.${ext}

# 在 npm workspaces（monorepo）下 electron-builder 无法从被提升的 node_modules
# 自动推断 electron 版本，故显式指定，避免 "Cannot compute electron version"。
electronVersion: 31.7.7

# 让 electron-builder 生成自动更新所需的 latest*.yml / app-update.yml。
# 实际上传由 CI 的 action-gh-release 做（构建时用 --publish never）。
publish:
  provider: github
  owner: TonyD365
  repo: Brickbot

directories:
  output: release
  # 图标源（icons/icon.png）放在这里；electron-builder 会从它生成 icns/ico。
  buildResources: icons

files:
  - dist/**/*
  - package.json
  - "!**/*.map"

# 把预编译的 Studio 插件随包带上，供 UI 的 "Install plugin" 使用。
extraResources:
  - from: ../../dist/Brickbot.rbxmx
    to: Brickbot.rbxmx

# 让 electron-builder 把 workspace 依赖 @brickbot/core 一并打入。
includeSubNodeModules: true
npmRebuild: false

mac:
  category: public.app-category.developer-tools
  # 单一 Universal 包（arm64 + x64 合并），Intel 与 Apple Silicon 通用。
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal

win:
  # Windows 没有"Universal 二进制"这种东西。x64 安装包在 Intel 和 ARM（ARM 通过内置 x64
  # 模拟运行）上都能装能跑，所以只出一个 x64 安装包，效果等同"一个包哪都能用"。
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
