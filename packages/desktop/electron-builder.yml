appId: com.claudeforroblox.studio
productName: Claude for Roblox Studio
copyright: Claude for Roblox Studio

# 输出文件名不能带空格：productName 有空格会导致生成名与 GitHub 上传后(空格→点)的
# 资源名不一致，使 electron-updater 下载更新时 404。用无空格的 artifactName 统一三者。
artifactName: Claude-for-Roblox-Studio-${version}-${arch}.${ext}

# 在 npm workspaces（monorepo）下 electron-builder 无法从被提升的 node_modules
# 自动推断 electron 版本，故显式指定，避免 "Cannot compute electron version"。
electronVersion: 31.7.7

# 让 electron-builder 生成自动更新所需的 latest*.yml / app-update.yml。
# 实际上传由 CI 的 action-gh-release 做（构建时用 --publish never）。
publish:
  provider: github
  owner: TonyD365
  repo: Claude-for-Roblox-Studio

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json
  - "!**/*.map"

# 把预编译的 Studio 插件随包带上，供 UI 的 "Install plugin" 使用。
extraResources:
  - from: ../../dist/ClaudeBridge.rbxmx
    to: ClaudeBridge.rbxmx

# 让 electron-builder 把 workspace 依赖 @claude-roblox/core 一并打入。
includeSubNodeModules: true
npmRebuild: false

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]

win:
  target:
    - target: nsis
      arch: [x64, arm64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
