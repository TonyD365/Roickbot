appId: com.claudeforroblox.studio
productName: Claude for Roblox Studio
copyright: Claude for Roblox Studio

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json
  - "!**/*.map"

# 把预编译的 Studio 插件随包带上，供 UI 的 "Install plugin" 使用。
extraResources:
  - from: ../../dist/ClaudeBridge.rbxmx
    to: ClaudeBridge.rbxmx

# 让 electron-builder 把 workspace 依赖 @claude-roblox/core 一并打入。
includeSubNodeModules: true
npmRebuild: false

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]

win:
  target:
    - target: nsis
      arch: [x64, arm64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
