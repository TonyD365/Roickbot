<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Menu-bar glyph: a little brick-robot head. Black + alpha = macOS template image. -->
  <mask id="face">
    <rect width="128" height="128" fill="black"/>
    <rect x="26" y="42" width="76" height="70" rx="18" fill="white"/>
    <rect x="46" y="34" width="14" height="12" rx="4" fill="white"/>
    <rect x="68" y="34" width="14" height="12" rx="4" fill="white"/>
    <!-- eye holes -->
    <circle cx="50" cy="74" r="9" fill="black"/>
    <circle cx="78" cy="74" r="9" fill="black"/>
    <!-- mouth hole -->
    <rect x="52" y="94" width="24" height="7" rx="3.5" fill="black"/>
  </mask>
  <rect width="128" height="128" fill="#000000" mask="url(#face)"/>
  <!-- antenna + spark -->
  <rect x="61" y="18" width="6" height="18" rx="3" fill="#000000"/>
  <circle cx="64" cy="14" r="8" fill="#000000"/>
</svg>
