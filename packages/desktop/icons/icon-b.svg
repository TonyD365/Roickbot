<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2B2740"/>
      <stop offset="1" stop-color="#141225"/>
    </linearGradient>
    <linearGradient id="studTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8A79FF"/>
      <stop offset="1" stop-color="#5B49E6"/>
    </linearGradient>
    <linearGradient id="studSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4B3AC9"/>
      <stop offset="1" stop-color="#382AA0"/>
    </linearGradient>
    <radialGradient id="sparkb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFDCCB"/>
      <stop offset="0.55" stop-color="#F2A088"/>
      <stop offset="1" stop-color="#E27B5C"/>
    </radialGradient>
    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bgb)"/>

  <!-- A single Roblox-style stud, rendered 3D -->
  <g filter="url(#ds)">
    <!-- cylinder body -->
    <path d="M300,470 L300,610 A212,74 0 0 0 724,610 L724,470 Z" fill="url(#studSide)"/>
    <!-- base top ellipse -->
    <ellipse cx="512" cy="470" rx="212" ry="74" fill="url(#studTop)"/>
    <!-- raised stud -->
    <path d="M404,430 L404,486 A108,38 0 0 0 620,486 L620,430 Z" fill="#4130B4"/>
    <ellipse cx="512" cy="430" rx="108" ry="38" fill="#9F90FF"/>
  </g>

  <!-- Claude-coral spark -->
  <g transform="translate(700,338)">
    <path d="M0,-64 C11,-20 20,-11 64,0 C20,11 11,20 0,64 C-11,20 -20,11 -64,0 C-20,-11 -11,-20 0,-64 Z" fill="url(#sparkb)"/>
    <circle r="13" fill="#ffffff" fill-opacity="0.9"/>
  </g>
</svg>
