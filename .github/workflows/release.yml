name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger so a build can be (re)run from a branch and attached to an
  # existing release without having to delete/recreate the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag/release to attach the built artifacts to"
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  plugin:
    name: Build Studio plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rojo
        run: |
          curl -sSL -o rojo.zip https://github.com/rojo-rbx/rojo/releases/download/v7.4.4/rojo-7.4.4-linux-x86_64.zip
          unzip -o rojo.zip rojo
          chmod +x rojo
          sudo mv rojo /usr/local/bin/rojo
          rojo --version
      - run: mkdir -p dist && rojo build plugin/default.project.json -o dist/ClaudeBridge.rbxmx
      - uses: actions/upload-artifact@v4
        with:
          name: ClaudeBridge-plugin
          path: dist/ClaudeBridge.rbxmx

  desktop:
    name: Build desktop app (${{ matrix.os }})
    needs: plugin
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # 插件 .rbxmx 需放到 dist/ 供 electron-builder 的 extraResources 打包。
      - uses: actions/download-artifact@v4
        with:
          name: ClaudeBridge-plugin
          path: dist
      - run: npm ci
      - run: npm run build:core
      - run: npm run build:desktop
      # electron-builder 只负责构建，不发布（发布由下方 action-gh-release 做）。
      - name: Package installers (arm64 + x64)
        run: npm run dist --workspace packages/desktop
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.exe
            packages/desktop/release/*.yml
            packages/desktop/release/*.blockmap

  release:
    name: Attach artifacts to the release
    needs: [plugin, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.zip' -o -name '*.rbxmx' \) -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS
      # Only upload files; do NOT touch the release title or body (the maintainer writes those).
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.rbxmx
            artifacts/**/*.yml
            artifacts/**/*.blockmap
            artifacts/SHA256SUMS
