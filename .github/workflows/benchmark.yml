name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Bridge benchmark
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          path: head
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: head/package-lock.json

      - name: Benchmark this PR / commit
        working-directory: head
        run: |
          npm ci
          npm run build:core
          BENCH_OUT=bench-results.json node bench.mjs

      # --- On PRs: also benchmark the base branch and compare, to catch slowdowns ---
      - name: Checkout base (${{ github.event.pull_request.base.ref }})
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Benchmark base
        if: github.event_name == 'pull_request'
        working-directory: base
        run: |
          npm ci
          npm run build:core
          # base may predate the benchmark script; use this PR's runner against base's core.
          cp ../head/bench.mjs ./bench.mjs
          BENCH_PORT=7400 BENCH_OUT=bench-results.json node bench.mjs

      - name: Compare and post PR comment
        if: github.event_name == 'pull_request'
        run: node head/bench-compare.mjs base/bench-results.json head/bench-results.json
      - name: Post comparison as a sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bridge-benchmark
          path: bench-summary.md

      # --- On push/dispatch: just keep the single-run summary ---
      - name: Use single-run summary
        if: github.event_name != 'pull_request'
        run: cp head/bench-summary.md bench-summary.md

      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            head/bench-results.json
            bench-summary.md
