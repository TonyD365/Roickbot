name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Bridge benchmark
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:core
      - name: Run bridge benchmark
        run: node bench.mjs
      - name: Post results as a PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bridge-benchmark
          path: bench-summary.md
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench-results.json
            bench-summary.md
